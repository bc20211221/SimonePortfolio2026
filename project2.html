        <div class="project-description" id="project-intro">
            <h2>项目介绍</h2>
            <p>《Fish Feast》是一款2D休闲类大鱼吃小鱼游戏，融合“BUG”随机事件玩法。
                游戏引入饱腹值压力机制，控制随机事件的触发节奏，玩家可以通过观察进行应对和利用。
                游戏主题源于“TapTap聚光灯2025年21天游戏创作挑战“，采用Unity引擎开发，Demo已上线TapTap平台，获得上万热度和多数好评。</p>
