        <!-- 项目描述 -->
        <div class="project-description">
            <h2>项目介绍</h2>
            <p>《LUMINA》是一款融合塔防肉鸽的节奏音乐游戏，玩家需要命中音符积攒能量，消耗能量放置角色并提升战斗力，抵御入侵获得最终胜利。游戏采用Unity引擎开发，Demo已投放itch独立游戏平台公开试玩。</p>
        </div>
